services:
  cpu:
    image: ghcr.io/sentiric/sentiric-stt-whisper-service:latest
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      - STT_WHISPER_SERVICE_DEVICE=cpu
      - STT_WHISPER_SERVICE_COMPUTE_TYPE=int8
      - STT_WHISPER_SERVICE_MODEL_SIZE=medium
    volumes: 
      - "../sentiric-certificates:/sentiric-certificates:ro"
      - "stt_whisper_cache:/app/model-cache"
    ports: 
      - "15030:15030"
      - "15031:15031"   
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:15030/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  stt_whisper_cache: