name: Docker Image CI (CPU & GPU)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Timeout ekle
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - target: cpu
            base_image: python:3.11-slim-bookworm
          - target: gpu
            base_image: nvidia/cuda:12.1.1-runtime-ubuntu22.04  # runtime kullan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Prepare Dynamic Build Arguments
        id: prep
        run: |
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
          echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          SERVICE_VERSION=$(grep '^version =' pyproject.toml | awk -F '\"' '{print $2}')
          echo "SERVICE_VERSION=$SERVICE_VERSION" >> $GITHUB_ENV
          echo "REPO_NAME_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Docker image (${{ matrix.target }})
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          no-cache: false
          tags: |
            ghcr.io/${{ env.REPO_NAME_LOWER }}:${{ matrix.target == 'cpu' && 'latest' || matrix.target }}
            ghcr.io/${{ env.REPO_NAME_LOWER }}:${{ matrix.target == 'cpu' && env.SERVICE_VERSION || format('{0}-{1}', env.SERVICE_VERSION, matrix.target) }}
            ghcr.io/${{ env.REPO_NAME_LOWER }}:${{ matrix.target }}-${{ env.GIT_COMMIT }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            SERVICE_VERSION=${{ env.SERVICE_VERSION }}
            GIT_COMMIT=${{ env.GIT_COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          platforms: linux/amd64

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache