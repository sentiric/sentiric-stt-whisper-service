name: Docker GPU Image (No Cache)

on:
  push:
    branches: [ "main" ]

jobs:
  build-gpu:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push GPU image (no cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.gpu
          push: true
          tags: ghcr.io/${{ github.repository }}:gpu-latest
          no-cache: true

      - name: Clean up Docker resources # TEMİZLİK ADIMI
        if: always()
        run: |
          echo "==> Cleaning up Docker build cache and images..."
          docker builder prune -af
          docker image prune -af
          echo "==> Displaying final disk space..."
          df -h