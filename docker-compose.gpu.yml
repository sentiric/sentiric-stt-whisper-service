services:
  gpu:
    image: ghcr.io/sentiric/sentiric-stt-whisper-service:gpu-latest
    build: 
      context: .
      dockerfile: Dockerfile.gpu
    environment:
      - STT_WHISPER_SERVICE_DEVICE=cuda
      - STT_WHISPER_SERVICE_COMPUTE_TYPE=float16
      - STT_WHISPER_SERVICE_MODEL_SIZE=medium
    volumes: 
      - "../sentiric-certificates:/sentiric-certificates:ro"
      - "stt_whisper_cache:/app/model-cache"
    ports: 
      - "15030:15030"
      - "15031:15031"      
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:15030/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  stt_whisper_cache: