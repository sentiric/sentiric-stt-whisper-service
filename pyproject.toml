[tool.poetry]
name = "sentiric-stt-whisper-service"
version = "1.0.0"
description = "Expert Whisper transcription service for Sentiric ecosystem"
authors = ["Sentiric Team"]
license = "Apache-2.0"
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.11"
fastapi = "^0.111.0"
uvicorn = {extras = ["standard"], version = "^0.29.0"}
pydantic = "^2.7.3"
pydantic-settings = "^2.3.4"
python-multipart = "^0.0.9"
structlog = "^24.1.0"
faster-whisper = "^1.0.3"
ctranslate2 = "^4.0.0"
soundfile = "^0.12.1"
librosa = "^0.10.1"
numpy = "^1.26.4"
# AV'yi OPSİYONEL yap - sistem bağımlılığı sorununu çöz
av = { version = "^11.0.0", optional = true }
torch = "^2.3.0"
aiofiles = "^23.2.1"
psutil = "^5.9.8"
prometheus-client = "^0.20.0"
prometheus-fastapi-instrumentator = "^7.0.0"

# SENTIRIC CONTRACTS - GitHub'dan
sentiric-contracts-py = { git = "https://github.com/sentiric/sentiric-contracts.git", tag = "v1.9.2" }

[tool.poetry.group.dev.dependencies]
pytest = "^8.2.2"
httpx = "^0.27.0"
poetry = "1.8.2"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.extras]
# AV opsiyonel yapıldı
audio = ["av"]